name: Daily Commit

on:
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Daily update for 23f2004090@ds.study.iitm.ac.in
        run: |
          echo "Daily update $(date)" >> activity.log

      - name: Commit changes
        run: |
          git config user.email "23f2004090@ds.study.iitm.ac.in"
          git config user.name "GitHub Action"
          git add activity.log
          git commit -m "Daily automated commit $(date)"
          git push
