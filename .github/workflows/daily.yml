name: Daily Commit

on:
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Daily update for 23f2004090@ds.study.iitm.ac.in
        run: |
          date >> activity.log
          cat activity.log

      - name: Commit and push changes
        run: |
          git config user.email "23f2004090@ds.study.iitm.ac.in"
          git config user.name "GitHub Action"
          git add -A
          git commit -m "Daily automated commit $(date)"
          git push origin main
